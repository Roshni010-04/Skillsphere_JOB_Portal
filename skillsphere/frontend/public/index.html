<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkillSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *{box-sizing:border-box;}
      body{font-family:'DM Sans',sans-serif;background:#0f172a;color:#f1f5f9;margin:0;}
      h1,h2,h3,h4,h5{font-family:'Syne',sans-serif;}
      ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#1e293b;}::-webkit-scrollbar-thumb{background:#f97316;border-radius:3px;}
      .glass{background:rgba(30,41,59,0.8);backdrop-filter:blur(12px);border:1px solid rgba(249,115,22,0.15);}
      input,textarea,select{background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 14px;width:100%;font-family:'DM Sans',sans-serif;outline:none;}
      input:focus,textarea:focus,select:focus{border-color:#f97316;box-shadow:0 0 0 2px rgba(249,115,22,0.2);}
      @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
      .fade-in{animation:fadeIn 0.3s ease forwards;}
    </style>
  </head>
  <body><div id="root"></div></body>
</html>
